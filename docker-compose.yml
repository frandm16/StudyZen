services:
  db:
    image: postgres:16
    container_name: studytracker-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/frandm16/studytracker-backend:v2.0.0
    container_name: studytracker-backend
    env_file:
      - .env
    environment:
      BACKEND_PRIVATE_PORT: ${BACKEND_PRIVATE_PORT}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PUBLIC_PORT}:${BACKEND_PRIVATE_PORT}"

volumes:
  postgres_data:
